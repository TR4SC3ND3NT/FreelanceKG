services:
  - type: web
    name: freelancekg-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build && npm run db:migrate:prod
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: freelancekg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: TELEGRAM_LINK_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: freelancekg-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: freelancekg-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ENABLE_OAUTH
        value: false
      - key: DEV_OAUTH_MOCK
        value: false
      - key: PAYMENT_PROVIDER
        value: disabled
      - key: TELEGRAM_POLLING_ENABLED
        value: false
      - key: STORAGE_PROVIDER
        value: local
      - key: EMAIL_FROM
        value: noreply@freelancekg.kg
      - key: EMAIL_REPLY_TO
        value: support@freelancekg.kg

  - type: web
    name: freelancekg-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: freelancekg-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: freelancekg-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: freelancekg-db
    plan: free
    databaseName: freelancekg
    user: freelancekg
